name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: fwal/setup-swift@v1
        with:
          swift-version: '5.9'

      - name: Install dependencies
        run: brew install create-dmg

      - name: Build MindScript
        run: |
          chmod +x scripts/ci_build.sh
          ./scripts/ci_build.sh

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          create-dmg \
            --volname "MindScript Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "MindScript.app" 175 120 \
            --hide-extension "MindScript.app" \
            --app-drop-link 425 120 \
            "dist/MindScript.dmg" \
            "dist/"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MindScript.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
